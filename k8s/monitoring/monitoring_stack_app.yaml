apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ksh25092000/Bootcamp
    targetRevision: main
    path: k8s/monitoring
    helm:
      valueFiles:
        - values.yaml
      installCRDs: true     
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
